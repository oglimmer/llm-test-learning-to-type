<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Typing Tutor</title>
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Simple focus styles for the typing input */
    #typingInput:focus {
      outline: 2px solid #2563eb;
    }
  </style>
</head>
<body class="min-h-screen bg-gray-100 flex flex-col items-center p-4">
  <header class="w-full max-w-3xl mb-6">
    <h1 class="text-3xl font-bold text-center mb-4">10‑Finger Typing Tutor</h1>
    <div class="flex justify-center space-x-4">
      <button id="beginnerBtn" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Beginner</button>
      <button id="advancedBtn" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">Advanced</button>
    </div>
  </header>

  <main class="w-full max-w-3xl flex flex-col items-center">
    <!-- Word display area -->
    <div id="wordDisplay" class="bg-white p-4 rounded shadow w-full text-center mb-4" style="min-height: 3rem;">
      <p class="text-xl font-mono">Click a mode to start</p>
    </div>
    <!-- Typing input -->
    <input id="typingInput" type="text" class="w-full p-3 border rounded font-mono" placeholder="Start typing here" disabled />

    <!-- Feedback panel -->
    <div id="feedback" class="mt-6 w-full bg-white p-4 rounded shadow">
      <h2 class="text-lg font-semibold mb-2">Performance Feedback</h2>
      <ul id="feedbackList" class="list-disc list-inside"></ul>
    </div>
  </main>

  <script src="script.js" type="module"></script>
</body>
</html>
